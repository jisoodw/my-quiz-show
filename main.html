<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 실시간 퀴즈쇼 메인 스테이지</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #4e73df; --accent: #ff4757; --winner: #ffa502; }
        body { background: #fdfdfd; color: #333; font-family: 'Pretendard', sans-serif; text-align: center; margin: 0; padding: 0; overflow: hidden; }
        
        .page { display: none; padding: 2vh 5vw; height: 100vh; box-sizing: border-box; }
        .active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* 쇼 시작하기 전 덮개 */
        #music-trigger { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: white; z-index: 9999; display: flex; justify-content: center; align-items: center; 
        }
        
        .waiting-layout { display: flex; width: 100%; gap: 4vw; justify-content: center; align-items: center; }
        .user-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-height: 40vh; overflow-y: auto; padding: 20px; border: 1px solid #eee; border-radius: 20px; width: 60%; background: #fcfcfc; }
        
        #q-text { font-size: clamp(35px, 4.5vw, 55px); font-weight: 800; margin: 2vh 0; color: #1a1a2e; word-break: keep-all; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5vh; width: 85%; margin-top: 20px; }
        .option-item { background: white; border: 3px solid var(--primary); padding: 3vh 2vw; border-radius: 20px; font-size: clamp(24px, 2.8vw, 32px); font-weight: bold; color: var(--primary); text-align: left; }
        .timer { font-size: clamp(80px, 10vw, 120px); color: var(--accent); font-weight: 900; margin: 1vh 0; line-height: 1; }
        
        /* 답안 제출 현황 표시 */
        .submit-status { 
            font-size: clamp(18px, 2vw, 24px); 
            color: #2ed573; 
            font-weight: 700; 
            margin: 0.5vh 0;
            background: #f0fff4;
            padding: 8px 20px;
            border-radius: 20px;
            display: inline-block;
        }
        
        .correct-list { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; max-height: 25vh; overflow-y: auto; width: 90%; }
        .user-tag { background: #eef2f7; padding: 10px 20px; border-radius: 25px; border: 1px solid #d1d8e0; font-weight: 600; font-size: 16px; }
        .correct-tag { background: #d1f7d1; border-color: #2ed573; color: #1b5e20; }

        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 4000; justify-content: center; align-items: center; color: white; }
        .modal-content { background: white; color: #333; padding: 40px; border-radius: 30px; width: 550px; max-width: 90vw; }

        .btn-blue { background: var(--primary); color: white; padding: 2vh 3vw; font-size: clamp(18px, 2.2vw, 26px); border: none; border-radius: 20px; cursor: pointer; font-weight: bold; box-shadow: 0 10px 20px rgba(78,115,223,0.2); }
        .control-bar { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 10px; z-index: 1000; }
        .btn-sub { background: #f1f2f6; color: #333; border: 1px solid #ddd; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
        
        /* ===== 모바일/태블릿 반응형 ===== */
        @media (max-width: 900px) {
            .waiting-layout { flex-direction: column; gap: 3vh; }
            .user-grid { width: 90%; max-height: 25vh; }
            .options-grid { grid-template-columns: 1fr; width: 95%; gap: 1.5vh; }
            #page-final > div { flex-direction: column !important; gap: 3vh !important; }
            #page-final > div > div { border-left: none !important; border-top: 2px solid #eee; padding-top: 2vh; }
        }
    </style>
</head>
<body>

    <div id="music-trigger">
        <button class="btn-blue" style="font-size: 40px; padding: 40px 80px;" onclick="startShow()">🎮 퀴즈쇼 시작하기 (BGM ON)</button>
    </div>

    <div id="page-waiting" class="page active">
        <h1 style="font-size: clamp(30px, 4vw, 45px); color: var(--primary); margin: 0 0 3vh 0;">🎬 잠시 후 퀴즈쇼가 시작됩니다!</h1>
        <div class="waiting-layout">
            <div style="text-align: center;">
                <img id="qr-img" src="" style="width: 28vh; min-width: 180px; border: 10px solid white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
                <p style="font-size: 18px; font-weight: bold; margin-top: 15px;">QR을 스캔하여 입장하세요!</p>
            </div>
            <div class="user-grid" id="user-display"></div>
        </div>
        <h2 id="user-count" style="margin-top: 3vh;">입장 인원: 0명</h2>
        <button class="btn-blue" style="margin-top: 3vh;" onclick="goToQuiz(1)">게임 스타트! 🚀</button>
    </div>

    <div id="page-quiz" class="page">
        <h2 id="quiz-header" style="color: var(--primary); margin: 0; font-size: 28px;">1번 문제 진행 중</h2>
        <div id="q-text">질문을 불러오는 중...</div>
        <div class="options-grid" id="screen-options"></div>
        <div id="timer-display" class="timer">15</div>
        <div id="submit-status" class="submit-status">답안 제출: 0 / 0명</div>
        <h3 id="live-count" style="margin: 0.5vh 0 0 0;">참여 인원: 0명</h3>
    </div>

    <div id="page-result" class="page">
        <h1 id="result-title" style="margin: 0; font-size: 40px;">정답 공개!</h1>
        <h2 id="correct-answer-text" style="font-size: clamp(24px, 3.5vw, 35px); background: #f1f2f6; padding: 3vh; border-radius: 25px; width: 85%; margin-top: 2vh;">정답 확인 중...</h2>
        <h3 style="margin-top: 4vh; font-size: 24px;">🏆 이번 문제 정답자 명단 🏆</h3>
        <div class="correct-list" id="correct-users"></div>
        <div style="margin-top: 5vh; display: flex; gap: 15px;">
            <button class="btn-blue" style="background: var(--winner);" onclick="openRoulette('correct')">🎰 정답자 추첨</button>
            <button class="btn-blue" id="next-btn" onclick="goToNextQuestion()">다음 문제로 ➡️</button>
            <button class="btn-blue" id="final-btn" style="display:none;" onclick="showFinalResult()">전체 결과 보기 🏁</button>
        </div>
    </div>

    <div id="page-final" class="page">
        <h1 style="font-size: clamp(40px, 5vw, 55px); color: var(--primary); margin: 0 0 2vh 0;">🏁 퀴즈쇼 종료!</h1>
        <div style="display: flex; gap: 40px; width: 100%; justify-content: center; margin-top: 2vh;">
            <div style="flex: 1; display: flex; flex-direction: column; align-items: center;">
                <h3 style="font-size: 24px;">💯 만점자 추첨</h3>
                <div class="correct-list" id="all-correct-users"></div>
                <button class="btn-blue" style="margin-top: 3vh; background: var(--winner);" onclick="openRoulette('all')">🎰 만점자 추첨</button>
            </div>
            <div style="flex: 1; border-left: 2px solid #eee; display: flex; flex-direction: column; align-items: center;">
                <h3 style="font-size: 24px;">🎁 행운권 추첨</h3>
                <div class="correct-list" id="everyone-list"></div>
                <button class="btn-blue" style="margin-top: 3vh; background: var(--primary);" onclick="openRoulette('everyone')">🎰 행운상 추첨</button>
            </div>
        </div>
    </div>

    <div id="roulette-modal" class="modal">
        <div class="modal-content">
            <h2 id="roulette-title">추첨 중...</h2>
            <div id="roulette-name" style="font-size: 65px; font-weight: 900; margin: 45px 0; color: var(--primary);">? ? ?</div>
            <button class="btn-sub" style="padding: 15px 35px; font-size: 18px; font-weight: bold;" onclick="closeRoulette()">창 닫기</button>
        </div>
    </div>

    <div class="control-bar">
        <button class="btn-sub" onclick="toggleAdmin()">⚙️ 설정/초기화</button>
        <button class="btn-sub" onclick="restartGame()" style="background: #fff4e0; color: #e67700; border-color: #ffd591;">🔄 처음부터 다시 시작</button>
    </div>

    <div id="admin-modal" class="modal">
        <div class="modal-content" style="text-align: left; width: 500px;">
            <h2 style="margin-top:0; color: #333;">⚙️ 관리자 도구</h2>
            <div id="admin-inputs" style="max-height: 350px; overflow-y: auto; margin-bottom: 20px;"></div>
            <button onclick="saveAdmin()" style="width:100%; background: var(--primary); color:white; padding:15px; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">문항 저장하기</button>
            <button onclick="resetParticipants()" style="width:100%; background: var(--accent); color:white; padding:15px; border:none; border-radius:10px; margin-top:10px; cursor:pointer;">⚠️ 참여자 전체 삭제</button>
            <button onclick="toggleAdmin()" style="width:100%; margin-top:10px; border:none; background:none; color:gray; cursor:pointer;">닫기</button>
        </div>
    </div>

    <audio id="bgm" src="audio/bgm.mp3" loop preload="auto"></audio>
    <audio id="sfx_drum" src="audio/drum.mp3" preload="auto"></audio>

    <script>
        // ===== 설정 (한 곳에서 관리) =====
        const TOTAL_Q = 3;        // 총 문제 개수
        const TIMER_SEC = 15;     // 문제당 제한 시간 (초)

        const firebaseConfig = {
            apiKey: "AIzaSyCAUursZJpOAMzBtl8HXapaeJRzzQ3TNBo",
            authDomain: "quiz-show-9a233.firebaseapp.com",
            projectId: "quiz-show-9a233",
            storageBucket: "quiz-show-9a233.firebasestorage.app",
            messagingSenderId: "311396328751",
            appId: "1:311396328751:web:9220be4591d77aa88f2dda"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let quizData = {};
        let currentQNum = 0;
        let winners = new Set();
        let timerInterval;
        let totalParticipants = 0;  // 전체 참여 인원 (실시간 갱신)

        function startShow() {
            document.getElementById('music-trigger').style.display = 'none';
            try {
                document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://jisoodw.github.io/my-quiz-show/index.html`;
                const bgm = document.getElementById('bgm');
                bgm.volume = 0.3;
                bgm.play().catch(e => console.log("음악 재생 차단됨"));
            } catch(e) { console.log("초기화 오류:", e); }
            // 게임 상태를 "ready"로 강제 초기화 (이전 게임 데이터가 남아있어도 깨끗하게)
            // → 참여자들은 "게임 스타트!" 누를 때까지 무조건 대기 화면을 보게 됨
            db.collection("game").doc("state").set({
                status: "ready",
                currentQ: 0,
                options: [],
                lastUpdate: Date.now()
            }).catch(e => console.log("상태 초기화 오류:", e));
            loadQuizData();
            listenParticipants();
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // ===== 참여자 실시간 감지 (입장 + 답안 제출 현황) =====
        function listenParticipants() {
            db.collection("participants").onSnapshot(snap => {
                totalParticipants = snap.size;

                // 대기 페이지 - 입장자 목록
                const list = document.getElementById('user-display');
                if (list) {
                    list.innerHTML = "";
                    snap.forEach(doc => {
                        list.innerHTML += `<div class="user-tag">${doc.id}</div>`;
                    });
                }
                document.getElementById('user-count').innerText = `입장 인원: ${snap.size}명`;
                document.getElementById('live-count').innerText = `참여 인원: ${snap.size}명`;

                // 퀴즈 페이지 - 답안 제출 현황 실시간 갱신
                updateSubmitStatus(snap);
            });
        }

        // ===== 답안 제출 현황 업데이트 =====
        function updateSubmitStatus(snap) {
            if (currentQNum === 0) return;
            let submitted = 0;
            snap.forEach(doc => {
                if (doc.data()[`ans${currentQNum}`] !== undefined) submitted++;
            });
            const statusEl = document.getElementById('submit-status');
            if (statusEl) {
                statusEl.innerText = `답안 제출: ${submitted} / ${snap.size}명`;
                // 모두 제출했으면 색상 변경 (사회자가 한눈에)
                if (snap.size > 0 && submitted === snap.size) {
                    statusEl.style.background = '#fff4e0';
                    statusEl.style.color = '#e67700';
                    statusEl.innerText = `✨ 전원 제출 완료! (${submitted}/${snap.size})`;
                } else {
                    statusEl.style.background = '#f0fff4';
                    statusEl.style.color = '#2ed573';
                }
            }
        }

        async function goToQuiz(qNum) {
            clearInterval(timerInterval);
            currentQNum = qNum;
            const data = quizData[qNum] || { q: "문제를 설정해주세요", options: ["1","2","3","4"], ans: 1 };
            showPage('page-quiz');
            document.getElementById('quiz-header').innerText = `${qNum}번 문제 진행 중`;
            document.getElementById('q-text').innerText = data.q;
            const optGrid = document.getElementById('screen-options');
            optGrid.innerHTML = "";
            data.options.forEach((opt, idx) => {
                optGrid.innerHTML += `<div class="option-item">${idx+1}. ${opt}</div>`;
            });

            // 답안 제출 현황 초기화
            const statusEl = document.getElementById('submit-status');
            statusEl.style.background = '#f0fff4';
            statusEl.style.color = '#2ed573';
            statusEl.innerText = `답안 제출: 0 / ${totalParticipants}명`;

            // Firestore에 새 문제 상태 저장 (merge 방식 + timestamp로 휴대폰이 새 신호 확실히 감지)
            await db.collection("game").doc("state").set({
                status: "playing",
                currentQ: qNum,
                options: data.options,
                lastUpdate: Date.now()
            }, { merge: true });

            // 타이머 시작 (1초 딜레이 제거: 시작하자마자 숫자 표시)
            let time = TIMER_SEC;
            const timerDisplay = document.getElementById('timer-display');
            timerDisplay.innerText = time;
            timerInterval = setInterval(() => {
                time--;
                timerDisplay.innerText = time;
                if (time <= 0) {
                    clearInterval(timerInterval);
                    showResult();
                }
            }, 1000);
        }

        // ===== 다음 문제로 이동 (단일 함수로 정리) =====
        function goToNextQuestion() {
            goToQuiz(currentQNum + 1);
        }

        async function showResult() {
            // set + merge로 변경 (문서 없어도 안전)
            await db.collection("game").doc("state").set({
                status: "waiting",
                lastUpdate: Date.now()
            }, { merge: true });

            showPage('page-result');
            const data = quizData[currentQNum] || { ans: 1, options: ["?"] };
            document.getElementById('correct-answer-text').innerText = `정답: ${data.ans}번 (${data.options[data.ans-1]})`;
            
            const snap = await db.collection("participants").get();
            const correctBox = document.getElementById('correct-users');
            correctBox.innerHTML = "";
            snap.forEach(doc => {
                if(doc.data()[`ans${currentQNum}`] == data.ans) {
                    correctBox.innerHTML += `<div class="user-tag correct-tag">${doc.id}</div>`;
                }
            });

            // 마지막 문제면 "전체 결과" 버튼, 아니면 "다음 문제" 버튼
            if(currentQNum >= TOTAL_Q) {
                document.getElementById('next-btn').style.display = 'none';
                document.getElementById('final-btn').style.display = 'block';
            } else {
                document.getElementById('next-btn').style.display = 'block';
                document.getElementById('final-btn').style.display = 'none';
            }
        }

        async function showFinalResult() {
            showPage('page-final');
            const snap = await db.collection("participants").get();
            const allBox = document.getElementById('all-correct-users');
            const everyBox = document.getElementById('everyone-list');
            allBox.innerHTML = ""; everyBox.innerHTML = "";

            // 전체 문제의 정답을 동적으로 수집 (TOTAL_Q에 따라)
            const answers = {};
            let allAnswersReady = true;
            for (let i = 1; i <= TOTAL_Q; i++) {
                if (quizData[i] && quizData[i].ans !== undefined) {
                    answers[i] = quizData[i].ans;
                } else {
                    allAnswersReady = false;
                }
            }

            snap.forEach(doc => {
                const u = doc.data();
                everyBox.innerHTML += `<div class="user-tag">${doc.id}</div>`;
                // 모든 문제를 다 맞힌 사람 체크
                if (allAnswersReady) {
                    let perfect = true;
                    for (let i = 1; i <= TOTAL_Q; i++) {
                        if (u[`ans${i}`] != answers[i]) { perfect = false; break; }
                    }
                    if (perfect) {
                        allBox.innerHTML += `<div class="user-tag correct-tag">${doc.id}</div>`;
                    }
                }
            });
        }

        async function openRoulette(type) {
            const snap = await db.collection("participants").get();
            let candidates = [];

            // 전체 문제 정답 수집 (안전하게)
            const answers = {};
            let allAnswersReady = true;
            for (let i = 1; i <= TOTAL_Q; i++) {
                if (quizData[i] && quizData[i].ans !== undefined) {
                    answers[i] = quizData[i].ans;
                } else {
                    allAnswersReady = false;
                }
            }

            snap.forEach(doc => {
                if (winners.has(doc.id)) return;
                const u = doc.data();

                if (type === 'correct') {
                    // 현재 문제 정답자 (안전장치: 데이터 없으면 무시)
                    if (quizData[currentQNum] && quizData[currentQNum].ans !== undefined
                        && u[`ans${currentQNum}`] == quizData[currentQNum].ans) {
                        candidates.push(doc.id);
                    }
                } else if (type === 'all') {
                    // 만점자
                    if (allAnswersReady) {
                        let perfect = true;
                        for (let i = 1; i <= TOTAL_Q; i++) {
                            if (u[`ans${i}`] != answers[i]) { perfect = false; break; }
                        }
                        if (perfect) candidates.push(doc.id);
                    }
                } else if (type === 'everyone') {
                    candidates.push(doc.id);
                }
            });

            if (candidates.length === 0) {
                alert("추첨 대상이 없습니다!");
                return;
            }

            document.getElementById('roulette-modal').style.display = 'flex';
            document.getElementById('roulette-title').innerText = "추첨 중...";
            const bgm = document.getElementById('bgm');
            bgm.pause();
            const drum = document.getElementById('sfx_drum');
            drum.currentTime = 0;
            drum.play().catch(e => {});

            let count = 0;
            const spin = setInterval(() => {
                document.getElementById('roulette-name').innerText = candidates[count % candidates.length];
                count++;
                if (count >= 50) { // 80ms * 50 = 4초
                    clearInterval(spin);
                    const winner = candidates[Math.floor(Math.random() * candidates.length)];
                    document.getElementById('roulette-name').innerText = winner;
                    document.getElementById('roulette-title').innerText = "🎊 당첨을 축하합니다! 🎊";
                    winners.add(winner);
                }
            }, 80);
        }

        function closeRoulette() { 
            document.getElementById('roulette-modal').style.display = 'none'; 
            document.getElementById('roulette-title').innerText = "추첨 중..."; 
            document.getElementById('roulette-name').innerText = "? ? ?";
            document.getElementById('sfx_drum').pause();
            document.getElementById('bgm').play().catch(e => {});
        }

        function toggleAdmin() {
            const m = document.getElementById('admin-modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        async function loadQuizData() {
            try {
                const doc = await db.collection("quiz_settings").doc("questions").get();
                if(doc.exists) quizData = doc.data();
                renderAdmin();
            } catch(e) { console.log("데이터 로드 실패:", e); }
        }

        function renderAdmin() {
            let h = "";
            for(let i = 1; i <= TOTAL_Q; i++) {
                const q = quizData[i] || {q:"", options:["","","",""], ans:1};
                h += `<div style="margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px;"><b>${i}번 문제</b><br><input id="aq${i}" value="${q.q}" placeholder="질문" style="width:95%;"><br>
                <input id="ao${i}" value="${q.options.join(',')}" placeholder="보기1,보기2,보기3,보기4" style="width:95%; margin-top:5px;"><br>
                정답(1-4): <input type="number" id="aa${i}" value="${q.ans}" style="width:50px;"></div>`;
            }
            document.getElementById('admin-inputs').innerHTML = h;
        }

        async function saveAdmin() {
            for(let i = 1; i <= TOTAL_Q; i++) {
                quizData[i] = {
                    q: document.getElementById(`aq${i}`).value,
                    options: document.getElementById(`ao${i}`).value.split(','),
                    ans: parseInt(document.getElementById(`aa${i}`).value)
                };
            }
            await db.collection("quiz_settings").doc("questions").set(quizData);
            alert("저장되었습니다!");
            toggleAdmin();
        }

        async function resetParticipants() {
            if(!confirm("⚠️ 모든 참여자 데이터를 삭제하시겠습니까?")) return;
            const snap = await db.collection("participants").get();
            const batch = db.batch();
            snap.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            winners.clear();
            alert("삭제 완료!");
            location.reload();
        }

        // ===== 게임 처음부터 다시 시작 (다음 회차용) =====
        async function restartGame() {
            if (!confirm("🔄 게임을 처음부터 다시 시작하시겠습니까?\n\n• 모든 참여자 데이터가 삭제됩니다\n• 당첨자 기록이 초기화됩니다\n• 게임 상태가 대기 화면으로 돌아갑니다\n\n(문항 설정은 그대로 유지됩니다)")) return;
            try {
                // 1. 참여자 전체 삭제
                const snap = await db.collection("participants").get();
                const batch = db.batch();
                snap.forEach(doc => batch.delete(doc.ref));
                await batch.commit();

                // 2. 게임 상태를 대기로 초기화 (휴대폰들도 자동으로 대기 화면으로 돌아감)
                await db.collection("game").doc("state").set({
                    status: "ready",
                    currentQ: 0,
                    options: [],
                    lastUpdate: Date.now()
                });

                // 3. 당첨자 기록 초기화
                winners.clear();

                alert("✅ 초기화 완료! 새 회차를 시작할 수 있습니다.");
                location.reload();
            } catch (e) {
                alert("초기화 중 오류가 발생했어요. 다시 시도해주세요.");
                console.log("재시작 오류:", e);
            }
        }
    </script>
