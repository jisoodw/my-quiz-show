<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>실시간 퀴즈쇼 메인 스테이지</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { 
            background: #1a1a2e; color: white; font-family: 'Pretendard', sans-serif; 
            text-align: center; margin: 0; padding: 20px; overflow: hidden;
        }
        /* 첫 음악 시작 레이어 */
        #music-trigger {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(26, 26, 46, 0.95); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }
        /* 메인 레이아웃: 왼쪽(접속자/타이머), 오른쪽(QR코드) */
        .main-layout { display: flex; height: 80vh; gap: 20px; padding: 20px; }
        .left-panel { flex: 2; display: flex; flex-direction: column; align-items: center; }
        .right-panel { flex: 1; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .qr-box { background: white; padding: 15px; border-radius: 15px; }
        .qr-box img { width: 250px; height: 250px; }
        
        .timer { font-size: 100px; color: #e94560; font-weight: bold; margin: 20px 0; }
        .user-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; overflow-y: auto; max-height: 400px; width: 100%; }
        .user-tag { background: #16213e; padding: 10px 20px; border-radius: 25px; border: 1px solid #4e73df; font-size: 18px; animation: popIn 0.3s ease-out; }
        
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        .control-panel { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 10px; }
        button { padding: 12px 25px; font-size: 16px; cursor: pointer; border-radius: 10px; border: none; background: #4e73df; color: white; font-weight: bold; }
        .btn-main { padding: 30px 60px; font-size: 30px; background: #e94560; }
        #roulette-display { font-size: 40px; color: #f9d423; margin-top: 20px; height: 60px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="music-trigger">
        <button class="btn-main" onclick="startShow()">🎵 음악과 함께 쇼 시작하기</button>
    </div>

    <div class="main-layout">
        <div class="left-panel">
            <h1 id="stage-title">🎬 퀴즈쇼 준비 중!</h1>
            <h2 id="user-count">입장 인원: 0명</h2>
            <div id="roulette-display"></div>
            <div id="timer-display" class="timer">--</div>
            <div id="user-display" class="user-list"></div>
        </div>

        <div class="right-panel">
            <h3>지금 바로 접속하세요!</h3>
            <div class="qr-box">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://jisoodw.github.io/my-quiz-show/index.html" alt="접속 QR코드">
            </div>
            <p style="margin-top: 15px; color: #aaa;">스마트폰으로 QR을 스캔하세요</p>
        </div>
    </div>

    <div class="control-panel">
        <button onclick="controlGame(1, 20, 2)">1번 문제</button>
        <button onclick="controlGame(2, 20, 4)">2번 문제</button>
        <button onclick="controlGame(3, 20, 1)">3번 문제</button>
        <button onclick="spinRoulette('correct')" style="background: #28a745;">정답자 추첨</button>
        <button onclick="spinRoulette('everyone')" style="background: #f9d423; color: #1a1a2e;">행운상 뽑기</button>
    </div>

    <audio id="bgm" src="audio/bgm.mp3" loop preload="auto"></audio>
    <audio id="sfx_win" src="audio/success.mp3" preload="auto"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCAUursZJpOAMzBtl8HXapaeJRzzQ3TNBo",
            authDomain: "quiz-show-9a233.firebaseapp.com",
            projectId: "quiz-show-9a233",
            storageBucket: "quiz-show-9a233.firebasestorage.app",
            messagingSenderId: "311396328751",
            appId: "1:311396328751:web:9220be4591d77aa88f2dda"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentCorrectAns = 0;
        let currentQNum = 0;

        function startShow() {
            document.getElementById('bgm').volume = 0.4;
            document.getElementById('bgm').play();
            document.getElementById('music-trigger').style.display = 'none';
        }

        // 실시간 접속자 목록 업데이트 (애니메이션 효과 포함)
        db.collection("participants").orderBy("joinedAt", "desc").onSnapshot((snapshot) => {
            const display = document.getElementById('user-display');
            display.innerHTML = "";
            document.getElementById('user-count').innerText = `입장 인원: ${snapshot.size}명`;
            snapshot.forEach((doc) => {
                const user = doc.data();
                display.innerHTML += `<div class="user-tag">${user.name}</div>`;
            });
        });

        async function controlGame(qNum, time, ans) {
            currentCorrectAns = ans;
            currentQNum = qNum;
            document.getElementById('stage-title').innerText = `${qNum}번 문제 진행 중!`;
            document.getElementById('roulette-display').innerText = "";
            await db.collection("game").doc("state").set({ status: "playing", currentQ: qNum });
            
            let timeLeft = time;
            const timerInterval = setInterval(() => {
                document.getElementById('timer-display').innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    finishQuestion();
                }
                timeLeft--;
            }, 1000);
        }

        async function finishQuestion() {
            await db.collection("game").doc("state").update({ status: "waiting" });
            document.getElementById('stage-title').innerText = `${currentQNum}번 종료! 정답은 ${currentCorrectAns}번`;
            document.getElementById('timer-display').innerText = "DONE";
        }

        async function spinRoulette(type) {
            const snap = await db.collection("participants").get();
            let candidates = [];
            snap.forEach(doc => {
                const user = doc.data();
                if(type === 'correct' && user[`ans${currentQNum}`] == currentCorrectAns) candidates.push(user.name);
                else if(type === 'everyone') candidates.push(user.name);
            });

            if(candidates.length === 0) return alert("대상자가 없습니다!");

            let count = 0;
            const spin = setInterval(() => {
                document.getElementById('roulette-display').innerText = "🎲 " + candidates[count % candidates.length];
                count++;
                if(count > 20) {
                    clearInterval(spin);
                    const winner = candidates[Math.floor(Math.random() * candidates.length)];
                    document.getElementById('roulette-display').innerHTML = `🎊 <span style="font-size: 1.2em;">${winner}</span>님 당첨! 🎊`;
                    document.getElementById('sfx_win').play();
                }
            }, 100);
        }
    </script>
</body>
</html>
