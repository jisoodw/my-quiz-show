<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🎬 실시간 퀴즈쇼 메인 스테이지</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #4e73df; --accent: #ff4757; --winner: #ffa502; }
        body { background: #fdfdfd; color: #333; font-family: 'Pretendard', sans-serif; text-align: center; margin: 0; padding: 0; overflow: hidden; }
        
        .page { display: none; padding: 40px; height: 100vh; box-sizing: border-box; }
        .active { display: flex; flex-direction: column; align-items: center; }

        #music-trigger { position: fixed; top:0; left:0; width:100%; height:100%; background: white; z-index: 5000; display: flex; justify-content: center; align-items: center; }
        .waiting-layout { display: flex; width: 100%; gap: 50px; justify-content: center; align-items: center; }
        .user-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-height: 350px; overflow-y: auto; padding: 20px; border: 1px solid #eee; border-radius: 20px; width: 60%; }
        
        /* 퀴즈 진행 화면 보강 */
        #q-text { font-size: 55px; font-weight: 800; margin: 20px 0; color: #1a1a2e; word-break: keep-all; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 80%; margin-top: 20px; }
        .option-item { background: white; border: 3px solid var(--primary); padding: 25px; border-radius: 20px; font-size: 30px; font-weight: bold; color: var(--primary); text-align: left; }
        .timer { font-size: 100px; color: var(--accent); font-weight: 900; margin: 10px 0; }
        
        /* 결과 및 기타 */
        .correct-list { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; max-height: 200px; overflow-y: auto; }
        .user-tag { background: #eef2f7; padding: 10px 20px; border-radius: 25px; border: 1px solid #d1d8e0; font-weight: 600; }
        .correct-tag { background: #d1f7d1; border-color: #2ed573; color: #1b5e20; }

        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 4000; justify-content: center; align-items: center; color: white; }
        .modal-content { background: white; color: #333; padding: 40px; border-radius: 30px; width: 550px; max-height: 80vh; overflow-y: auto; }

        .btn-blue { background: var(--primary); color: white; padding: 20px 40px; font-size: 24px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; }
        .control-bar { position: fixed; bottom: 20px; display: flex; gap: 10px; z-index: 1000; }
        .btn-sub { background: #f1f2f6; color: #333; border: 1px solid #ddd; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="music-trigger">
        <button class="btn-blue" style="font-size: 40px;" onclick="startShow()">🎮 퀴즈쇼 시작하기 (BGM ON)</button>
    </div>

    <div id="page-waiting" class="page active">
        <h1 style="font-size: 45px; color: var(--primary); margin-top: 0;">🎬 잠시 후 퀴즈쇼가 시작됩니다!</h1>
        <div class="waiting-layout">
            <div style="text-align: center;">
                <img id="qr-img" src="" style="width: 250px; border: 10px solid white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
                <p style="font-size: 18px; font-weight: bold; margin-top: 15px;">스캔하여 입장하세요!</p>
            </div>
            <div class="user-grid" id="user-display"></div>
        </div>
        <h2 id="user-count" style="margin-top: 20px;">입장 인원: 0명</h2>
        <button class="btn-blue" style="margin-top: 15px;" onclick="goToQuiz(1)">게임 스타트! 🚀</button>
    </div>

    <div id="page-quiz" class="page">
        <h2 id="quiz-header" style="color: var(--primary); margin: 0;">1번 문제 진행 중</h2>
        <div id="q-text">질문 내용이 표시됩니다.</div>
        <div class="options-grid" id="screen-options">
            </div>
        <div id="timer-display" class="timer">20</div>
        <h3 id="live-count">현재 참여 중: 0명</h3>
    </div>

    <div id="page-result" class="page">
        <h1 id="result-title" style="margin: 0;">정답 공개!</h1>
        <h2 id="correct-answer-text" style="font-size: 35px; background: #f1f2f6; padding:
