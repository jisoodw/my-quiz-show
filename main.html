<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>실시간 퀴즈쇼 메인 스테이지</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { 
            background: #1a1a2e; color: white; font-family: 'Pretendard', sans-serif; 
            text-align: center; margin: 0; overflow: hidden;
        }
        .intro-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #1a1a2e; z-index: 100; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
        }
        .qr-box { 
            background: white; padding: 20px; border-radius: 20px; 
            margin: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.5); 
        }
        .qr-box img { width: 350px; height: 350px; }
        .timer { font-size: 100px; color: #e94560; font-weight: bold; margin: 20px 0; }
        .user-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px; }
        .user-tag { background: #16213e; padding: 12px 25px; border-radius: 30px; border: 1px solid #4e73df; font-size: 20px; }
        .control-panel { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 10px; }
        button { 
            padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 12px; 
            border: none; background: #4e73df; color: white; font-weight: bold;
        }
        .btn-start { padding: 30px 60px; font-size: 30px; background: #e94560; }
        #roulette-display { font-size: 40px; color: #f9d423; margin: 20px; min-height: 60px; }
    </style>
</head>
<body>

    <div id="intro-layer" class="intro-screen">
        <h1>🎮 실시간 퀴즈쇼에 접속하세요!</h1>
        <div class="qr-box">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https://jisoodw.github.io/my-quiz-show/index.html" alt="접속 QR코드">
        </div>
        <p style="font-size: 24px;">스마트폰으로 QR코드를 찍고 입장해주세요.</p>
        <button class="btn-start" onclick="startShow()">쇼 시작하기 (BGM ON)</button>
    </div>

    <div class="container">
        <h1 id="stage-title" style="margin-top: 50px;">🎬 현재 참여 인원</h1>
        <h2 id="user-count">준비 중...</h2>
        <div id="user-display" class="user-list"></div>
        <div id="timer-display" class="timer">--</div>
        <div id="roulette-display"></div>

        <div class="control-panel">
            <button onclick="controlGame(1, 20, 2)">1번 문제 시작</button>
            <button onclick="controlGame(2, 20, 4)">2번 문제 시작</button>
            <button onclick="controlGame(3, 20, 1)">3번 문제 시작</button>
            <button onclick="spinRoulette('correct')" style="background: #28a745;">문제 정답자 추첨</button>
            <button onclick="spinRoulette('everyone')" style="background: #f9d423; color: #1a1a2e;">전체 행운권</button>
        </div>
    </div>

    <audio id="bgm" src="audio/bgm.mp3" loop preload="auto"></audio>
    <audio id="sfx_win" src="audio/success.mp3" preload="auto"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCAUursZJpOAMzBtl8HXapaeJRzzQ3TNBo",
            authDomain: "quiz-show-9a233.firebaseapp.com",
            projectId: "quiz-show-9a233",
            storageBucket: "quiz-show-9a233.firebasestorage.app",
            messagingSenderId: "311396328751",
            appId: "1:311396328751:web:9220be4591d77aa88f2dda"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentCorrectAns = 0;
        let currentQNum = 0;

        // 쇼 시작 버튼을 눌러야 음악이 나오고 QR 레이어가 사라짐
        function startShow() {
            const bgm = document.getElementById('bgm');
            bgm.volume = 0.5; // 배경음악 볼륨 조절 (0.0 ~ 1.0)
            bgm.play();
            document.getElementById('intro-layer').style.display = 'none';
        }

        // 실시간 접속자 목록 업데이트
        db.collection("participants").orderBy("joinedAt", "desc").onSnapshot((snapshot) => {
            const display = document.getElementById('user-display');
            display.innerHTML = "";
            document.getElementById('user-count').innerText = `${snapshot.size}명 접속 중`;
            snapshot.forEach((doc) => {
                const user = doc.data();
                display.innerHTML += `<div class="user-tag">${user.name}</div>`;
            });
        });

        async function controlGame(qNum, time, ans) {
            currentCorrectAns = ans;
            currentQNum = qNum;
            document.getElementById('stage-title').innerText = `${qNum}번 문제 진행 중!`;
            await db.collection("game").doc("state").set({ status: "playing", currentQ: qNum });
            
            let timeLeft = time;
            const timerInterval = setInterval(() => {
                document.getElementById('timer-display').innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    finishQuestion();
                }
                timeLeft--;
            }, 1000);
        }

        async function finishQuestion() {
            await db.collection("game").doc("state").update({ status: "waiting" });
            document.getElementById('stage-title').innerText = `${currentQNum}번 종료! 정답은 ${currentCorrectAns}번`;
        }

        async function spinRoulette(type) {
            const snap = await db.collection("participants").get();
            let candidates = [];
            snap.forEach(doc => {
                const user = doc.data();
                if(type === 'correct' && user[`ans${currentQNum}`] == currentCorrectAns) candidates.push(user.name);
                else if(type === 'everyone') candidates.push(user.name);
            });

            if(candidates.length === 0) return alert("대상자가 없습니다!");

            let count = 0;
            const spin = setInterval(() => {
                document.getElementById('roulette-display').innerText = "🎲 " + candidates[count % candidates.length];
                count++;
                if(count > 20) {
                    clearInterval(spin);
                    const winner = candidates[Math.floor(Math.random() * candidates.length)];
                    document.getElementById('roulette-display').innerHTML = `🎊 <b>${winner}</b>님 당첨! 🎊`;
                    document.getElementById('sfx_win').play();
                }
            }, 100);
        }
    </script>
</body>
</html>
